---
format_version: '13'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: react-native
workflows:
  test:
    description: |
      Install dependencies, lint, and type-check the project.
    steps:
    - git-clone@8: {}
    - restore-npm-cache@3: {}
    - npm@3:
        title: npm install
        inputs:
        - command: install
    - save-npm-cache@1: {}
    - npm@3:
        title: Lint
        inputs:
        - command: run lint
    - script@1:
        title: Type-check
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -euo pipefail
            npx tsc --noEmit
  android-dev-build:
    meta:
      bitrise.io:
        stack: linux-docker-android-22.04
        machine_type_id: g2.linux.large
    description: |
      Build a dev APK via Expo prebuild and android-build.
    steps:
    - git-clone@8: {}
    - restore-npm-cache@3: {}
    - npm@3:
        title: npm install
        inputs:
        - command: install
    - save-npm-cache@1: {}
    - script@1:
        title: Expo prebuild
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -euo pipefail
            set -x
            npx expo prebuild
    - android-build@1:
        inputs:
        - project_location: "$BITRISE_SOURCE_DIR/android"
        - module: app
        - variant: release
        - arguments: "-Pandroid.injected.build.abi=arm64-v8a"
    - deploy-to-bitrise-io@2: {}
app:
  envs:
  - PLATFORM: android
    opts:
      is_expand: false
