---
format_version: '13'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: react-native

workflows:
  test:
    description: |
      Install dependencies and run TypeScript type-check.
    steps:
    - git-clone@8: {}
    - restore-npm-cache@3: {}
    - npm@1:
        title: npm install
        inputs:
        - command: install
    - save-npm-cache@1: {}
    - npm@1:
        title: Type-check
        inputs:
        - command: test

  android-build:
    meta:
      bitrise.io:
        stack: linux-docker-android-22.04
        machine_type_id: g2.linux.medium
    description: |
      Build a release APK via Expo prebuild and android-build.
    steps:
    - git-clone@8: {}
    - restore-npm-cache@3: {}
    - npm@1:
        title: npm install
        inputs:
        - command: install
    - save-npm-cache@1: {}
    - script@1:
        title: Expo prebuild Android
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -euo pipefail
            set -x
            npx expo prebuild --platform android --non-interactive
    - android-build@1:
        inputs:
        - project_location: "$BITRISE_SOURCE_DIR/android"
        - module: app
        - variant: release
    - deploy-to-bitrise-io@2: {}

app:
  envs:
  - PLATFORM: android
    opts:
      is_expand: false
